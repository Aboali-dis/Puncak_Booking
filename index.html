<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puncak Go</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="topbar">
        <div>$ Currency</div>
        <select>
            <option>English</option>
            <option>العربية</option>

        </select>
    </div>

    <div class="logo-section">
        <img src="logo.png" alt="Puncak Go Logo" class="logo">
    </div>

    <div class="services">
        <button class="card">
            <span>🏡</span><br>
            Rent Villa

            <span>🚗</span><br>
            Rent Car
        </button>
        <button class="card center">
            <span>🗺️</span> Tours
        </button>
    </div>

    <div class="extra-section">
        <button class="extra">Other Services</button>
    </div>

    <div class="bottom-nav">
        <a href="#">Home</a>
        <a href="#">Rules</a>
        <a href="#">History</a>
    </div>

</html>
