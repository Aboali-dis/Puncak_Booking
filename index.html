<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PuncakGo</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ===== Top Bar ===== -->

<div class="top-bar">

<select id="currency">
<option value="usd">USD</option>
<option value="sar">SAR</option>
<option value="eur">EUR</option>
</select>

<select id="language">
<option value="en">English</option>
<option value="ar">العربية</option>
<option value="id">Indonesia</option>
</select>

</div>


<!-- ===== Logo ===== -->

<div class="logo-section">

<img src="logo-puncakgo.png" class="logo">

<h1>PuncakGo</h1>

<p id="tagline">
Your gateway to villas, cars & tours in Puncak
</p>

</div>


<!-- ===== Main Box ===== -->

<div class="main-glass glass">

<h2 id="welcome">
Welcome to Puncak
</h2>

<p id="desc">
Book your villa, car, and enjoy your trip
</p>

<div class="buttons">

<button class="service-btn" id="villaBtn">
🏡 Rent Villa
</button>

<button class="service-btn" id="carBtn">
🚗 Rent Car
</button>

<button class="service-btn" id="tourBtn">
🗺 Tours
</button>

</div>

</div>


<!-- ===== Offer ===== -->

<div class="offer-box glass" id="offer">

✨ Book Villa + Car and get 10% Discount

</div>


<!-- ===== Currency Converter Popup ===== -->

<div id="converter" class="converter">

<input type="number" id="amount" placeholder="Enter amount">

<p id="result"></p>

</div>


<!-- ===== Bottom Nav ===== -->

<div class="bottom-nav">

<button id="homeBtn">🏠 Home</button>
<button id="termsBtn">📜 Terms</button>
<button id="historyBtn">📊 History</button>

</div>


<script src="script.js"></script>

</body>

</html>
