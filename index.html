<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puncak Go</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-slider">
        <div class="slide active" style="background-image: url('puncak1.jpg');"></div>
        <div class="slide" style="background-image: url('puncak2.jpg');"></div>
        <div class="slide" style="background-image: url('puncak3.jpg');"></div>
        <div class="slide" style="background-image: url('puncak4.jpg');"></div>
    </div>
    <div class="overlay"></div>

    <header>
    <div class="logo">
        <img src="logo-puncakgo.png" alt="Puncak Go" id="site-logo">
    </div>
    <div class="nav-btns">
        <button class="nav-btn" onclick="toggleCurr()">💰 صرف</button>
        <button class="nav-btn" onclick="toggleLang()" id="btn-lang">English</button>
        <button class="nav-btn" onclick="adminLogin()">⚙️</button>
    </div>
    </header>
    

    <main class="content">
        <div class="welcome-box">
            <h1 id="welcome-title">مرحباً بك في كوتا بونجا</h1>
            <div class="ticker-wrap">
                <div class="ticker">
                    <span id="promo-text">✨ عرض خاص: احجز الآن واحصل على خصم 10% على جميع الخدمات ✨</span>
                </div>
            </div>
        </div>

        <div class="services-grid">
            <div class="service-card" onclick="openSection('villas')">
                <div class="card-icon">🏘️</div>
                <h3 id="srv-villas">إيجار فلل</h3>
            </div>
            <div class="service-card" onclick="openSection('cars')">
                <div class="card-icon">🚗</div>
                <h3 id="srv-cars">تأجير سيارات</h3>
            </div>
            <div class="service-card" onclick="openSection('tours')">
                <div class="card-icon">🗺️</div>
                <h3 id="srv-tours">خدمات سياحية</h3>
            </div>
        </div>

        <button class="other-btn" id="btn-others">➕ خدمات أخرى (مطاعم، حلاق...)</button>
    </main>

    <footer>
        <p id="txt-footer">Puncak Go - جميع الحقوق محفوظة 2026</p>
        <a href="#" id="txt-terms">الشروط والأحكام</a>
    </footer>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="goHome()">
            <span>🏠</span>
            <p id="nav-home">الهوم</p>
        </div>
        <div class="nav-item" onclick="openHistory()">
            <span>📜</span>
            <p id="nav-history">الهيستوري</p>
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
