<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PuncakGo</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ===== Top Bar ===== -->
  <div class="currency-box glass">

<input type="number" id="amount" placeholder="Enter amount">

<select id="fromCurrency">

<option value="usd">USD</option>
<option value="sar">SAR</option>
<option value="eur">EUR</option>

</select>

<button onclick="convertCurrency()">Convert</button>

<p id="result"></p>

  </div>

<div class="top-bar glass">

<div>

<select id="currency">
<option value="idr">IDR</option>
<option value="usd">USD</option>
<option value="sar">SAR</option>
</select>

</div>

<div>

<select id="language">
<option value="en">English</option>
<option value="ar">العربية</option>
<option value="id">Indonesia</option>
</select>

</div>

</div>


<!-- ===== Logo Section ===== -->

<div class="logo-section">

<img src="logo-puncakgo.png" class="logo">

<h1>PuncakGo</h1>

<p>Your gateway to villas, cars & tours in Puncak</p>

</div>


<!-- ===== Main App Card ===== -->

<div class="main-glass glass">

<h2>Welcome to Puncak</h2>

<p>Book your villa, car, and enjoy your trip</p>

<div class="buttons">

<button class="service-btn">
🏡 Rent Villa
</button>

<button class="service-btn">
🚗 Rent Car
</button>

<button class="service-btn">
🗺 Tours
</button>

</div>

</div>


<!-- ===== Offer Box ===== -->

<div class="offer-box glass">

✨ Book Villa + Car and get 10% Discount

</div>


<!-- ===== Extra Services ===== -->

<div class="extra-services">

<button class="extra-btn">
More Services
</button>

</div>


<!-- ===== Bottom Navigation ===== -->

<div class="bottom-nav glass">

<button>
🏠 Home
</button>

<button>
📜 Terms
</button>

<button>
📊 History
</button>

</div>


<script src="script.js"></script>

</body>

</html>
