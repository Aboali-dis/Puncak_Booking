<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PuncakGo</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- ===== Top Bar ===== -->
<div class="top-bar glass">

<div class="currency">
<select id="currency">
<option value="idr">IDR</option>
<option value="usd">USD</option>
<option value="sar">SAR</option>
</select>
</div>

<div class="language">
<select id="language">
<option value="en">English</option>
<option value="ar">العربية</option>
<option value="id">Bahasa</option>
</select>
</div>

</div>

<!-- ===== Logo Section ===== -->
<div class="logo-section">

<img src="logo-puncakgo.png" class="logo">

<h1>PuncakGo</h1>

<p data-key="tagline">Your gateway to villas, cars & tours in Puncak</p>

</div>

<!-- ===== Main Glass Box ===== -->
<div class="main-glass glass">

<h2 data-key="welcome">Welcome to Puncak</h2>

<p data-key="subtitle">Book your villa, car, and enjoy your trip</p>

<div class="buttons">

<button class="service-btn" data-key="rentVilla">🏡 Rent Villa</button>

<button class="service-btn" data-key="rentCar">🚗 Rent Car</button>

<button class="service-btn" data-key="tours">🗺 Tours</button>

</div>

</div>

<!-- ===== Special Offer ===== -->
<div class="offer-box glass">

<span data-key="offer">✨ Book Villa + Car and get 10% Discount</span>

</div>

<!-- ===== Extra Services ===== -->
<div class="extra-services">

<button class="extra-btn glass" data-key="moreServices">More Services</button>

</div>

<!-- ===== Bottom Navigation ===== -->
<div class="bottom-nav glass">

<button data-key="home">🏠 Home</button>

<button data-key="terms">📜 Terms</button>

<button data-key="history">📊 History</button>

</div>

<script src="script.js"></script>

</body>
    </html>
